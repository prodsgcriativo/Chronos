<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Pro - Q-Matrix Preditiva</title>
    <style>
        :root {
            --bg-color: #131314;
            --chat-bg: #1e1f20;
            --text-color: #e3e3e3;
            --user-msg: #2b2a33;
            --ai-msg: #1e1f20;
            --accent-color: #4b90ff;
            --input-bg: #282a2d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #303134;
        }

        .config-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="password"] {
            background: var(--input-bg);
            border: 1px solid #444;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            width: 250px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-message {
            background-color: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background-color: var(--ai-msg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #303134;
        }

        .loading {
            align-self: flex-start;
            opacity: 0.6;
            font-style: italic;
        }

        footer {
            padding: 20px;
            background-color: var(--bg-color);
        }

        .input-area {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            background: var(--input-bg);
            padding: 8px 15px;
            border-radius: 28px;
            align-items: center;
            border: 1px solid #3c4043;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            resize: none;
            outline: none;
            padding: 8px 0;
            font-size: 16px;
            max-height: 150px;
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <h2>AI Chat Assistant <span style="font-size: 12px; color: var(--accent-color); vertical-align: middle;">[Q-Matrix Ativa]</span></h2>
        <div class="config-container">
            <input type="password" id="api-key" placeholder="Insira sua Gemini API Key">
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai-message">Sistema Inicializado com Matriz Preditiva de Alinhamento. Cole sua API Key para interagir com o modelo.</div>
    </div>

    <footer>
        <div class="input-area">
            <textarea id="user-input" rows="1" placeholder="Digite sua mensagem..."></textarea>
            <button id="send-btn" onclick="sendMessage()">Enviar</button>
        </div>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const apiKeyInput = document.getElementById('api-key');
        const sendBtn = document.getElementById('send-btn');

        if (localStorage.getItem('gemini_api_key')) {
            apiKeyInput.value = localStorage.getItem('gemini_api_key');
        }

        apiKeyInput.addEventListener('input', () => {
            localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
        });

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function formatMarkdown(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        // IMPLEMENTAÇÃO DA Q-MATRIX PREDITIVA
        function processPredictiveQMatrix(userText) {
            const textLower = userText.toLowerCase();
            
            // Definição dos eixos da Matriz: [Passado, Presente, Futuro, Temporal_Fixo]
            let qVector = [0, 0, 0, 0];

            // Palavras-chave mapeadas para análise preditiva de intenção
            if (textLower.includes("passado") || textLower.includes("antigamente") || textLower.includes("aconteceu")) {
                qVector[0] = 1; // Foco em Recuperação Histórica
            }
            if (textLower.includes("hoje") || textLower.includes("agora") || textLower.includes("atual")) {
                qVector[1] = 1; // Foco em Tempo Real / Sincronia
            }
            if (textLower.includes("futuro") || textLower.includes("previsão") || textLower.includes("acontecerá") || textLower.includes("2030")) {
                qVector[2] = 1; // Foco em Projeção Preditiva
            }
            if (textLower.includes("que dia") || textLower.includes("que horas") || textLower.includes("data")) {
                qVector[3] = 1; // Foco em Metadados Cronológicos
            }

            // Gerador de Instrução com base no resultado da Matriz Preditiva
            const agora = new Date();
            const dataAtual = agora.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const horaAtual = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            let baseInstruction = `Você é um motor de IA guiado por uma Q-Matrix Preditiva. O tempo real do sistema do cliente é ${dataAtual}, às ${horaAtual}.`;

            // Condicional de ativação baseada no mapeamento vetorial
            if (qVector[2] === 1) {
                // Se o usuário interagir com projeções futuras ou citar anos como 2030, a matriz muda o comportamento interno
                baseInstruction += " O usuário acionou o vetor de Projeção de Futuro. Atue de forma lógica criando cenários plausíveis, mantendo a consistência conceitual da linha do tempo informada.";
            } else if (qVector[3] === 1 || qVector[1] === 1) {
                baseInstruction += " O usuário acionou o vetor de Sincronia Temporal. Responda com precisão absoluta usando os dados de tempo real fornecidos, sem deixar margem para alucinações cronológicas.";
            }

            return baseInstruction;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!text) return;
            if (!apiKey) {
                alert('Por favor, insira sua chave de API do Gemini no topo da tela.');
                return;
            }

            userInput.value = '';
            userInput.style.height = 'auto';
            userInput.disabled = true;
            sendBtn.disabled = true;

            appendMessage(text, 'user-message', false);
            const loadingDiv = appendMessage('Processando Matriz...', 'ai-message loading');
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Executa o cálculo da Matriz Preditiva antes do envio
            const dynamicSystemInstruction = processPredictiveQMatrix(text);

            try {
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [{ text: dynamicSystemInstruction }]
                        },
                        contents: [{
                            parts: [{ text: text }]
                        }]
                    })
                });

                const data = await response.json();
                loadingDiv.remove();

                if (data.error) {
                    appendMessage(`Erro da API: ${data.error.message}`, 'ai-message', false);
                    return;
                }

                if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    appendMessage(aiResponse, 'ai-message', true);
                } else {
                    appendMessage('Erro: Resposta estruturada incorretamente pelo servidor.', 'ai-message', false);
                }

            } catch (error) {
                console.error(error);
                if (loadingDiv) loadingDiv.remove();
                appendMessage('Erro de conexão ao tentar se comunicar com o Gemini.', 'ai-message', false);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendMessage(text, className, parseMarkdown = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            
            if (parseMarkdown) {
                messageDiv.innerHTML = formatMarkdown(text);
            } else {
                messageDiv.textContent = text;
            }
            
            chatContainer.appendChild(messageDiv);
            return messageDiv;
        }
    </script>
</body>
</html>
